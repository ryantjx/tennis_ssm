<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis SSM — WTA Match Predictions</title>
    <style>
        :root {
            --bg: #0b0d12;
            --surface: #141821;
            --surface-2: #1c212e;
            --border: #2a3142;
            --text: #f0f1f5;
            --text-muted: #8b92a8;
            --accent: #4ade80;
            --accent-dim: #22c55e;
            --accent-glow: rgba(74, 222, 128, 0.15);
            --danger: #f87171;
            --danger-glow: rgba(248, 113, 113, 0.15);
            --warning: #fbbf24;
            --info: #60a5fa;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
        }

        [data-theme="light"] {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --surface-2: #f0f2f5;
            --border: #d8dce6;
            --text: #1a1d27;
            --text-muted: #5c6270;
            --accent: #16a34a;
            --accent-dim: #15803d;
            --accent-glow: rgba(22, 163, 74, 0.12);
            --danger: #dc2626;
            --danger-glow: rgba(220, 38, 38, 0.10);
            --warning: #b45309;
            --info: #2563eb;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            transition: background 0.25s, color 0.25s;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Header & nav */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent-dim), var(--accent));
            display: grid;
            place-items: center;
            font-size: 1.4rem;
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .brand-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .brand-text .subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        nav.tabs {
            display: flex;
            gap: 0.25rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.25rem;
        }

        nav.tabs .tab {
            padding: 0.55rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            border: none;
            background: transparent;
            transition: all 0.2s;
        }

        nav.tabs .tab:hover { color: var(--text); }
        nav.tabs .tab.active {
            background: var(--surface-2);
            color: var(--accent);
            box-shadow: 0 1px 4px rgba(0,0,0,0.25);
        }

        .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            display: grid;
            place-items: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover { border-color: var(--accent); }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Metrics */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            box-shadow: var(--shadow);
        }

        .metric-card .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
        }

        .metric-card .value {
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 0.2rem;
        }

        .metric-card .value.good { color: var(--accent); }
        .metric-card .value.bad { color: var(--danger); }
        .metric-card .value.info { color: var(--info); }

        .metric-card .delta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        /* Section title */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-title .count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            background: var(--surface-2);
            padding: 0.15rem 0.55rem;
            border-radius: 999px;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
        }

        .filters input, .filters select {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 0.55rem 0.8rem;
            font-size: 0.875rem;
            outline: none;
        }

        .filters input:focus, .filters select:focus { border-color: var(--accent-dim); }

        .filters input[type="text"] { flex: 1; min-width: 180px; }

        .filters label {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
        }

        .filters input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
        }

        /* Date group */
        .date-group {
            margin-bottom: 1.5rem;
        }

        .date-header {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.6rem;
            padding-left: 0.25rem;
        }

        /* Match cards */
        .match-list { display: flex; flex-direction: column; gap: 0.6rem; }

        .match-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: border-color 0.2s, transform 0.15s;
        }

        .match-card:hover { border-color: var(--accent-dim); }

        .match-summary {
            padding: 1rem 1.25rem;
            display: grid;
            grid-template-columns: 70px 1fr 1fr 110px 36px;
            gap: 1rem;
            align-items: center;
            cursor: pointer;
        }

        .match-summary .date {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .match-summary .player-block {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .match-summary .player-name {
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .match-summary .player-name .seed {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: var(--surface-2);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .match-summary .player-prob {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .match-summary .player-block.winner .player-name { color: var(--accent); }
        .match-summary .player-block.loser .player-name { color: var(--text); }

        .match-summary .prob-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--surface-2);
            overflow: hidden;
            margin-top: 0.35rem;
            display: flex;
        }

        .match-summary .prob-bar .fill {
            height: 100%;
            transition: width 0.4s ease;
        }

        .match-summary .prob-bar .fill.p1 { background: var(--accent); }
        .match-summary .prob-bar .fill.p2 { background: var(--danger); }

        .match-summary .result {
            text-align: center;
        }

        .match-summary .result .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.7rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .match-summary .result .badge.correct {
            background: var(--accent-glow);
            color: var(--accent);
            border: 1px solid rgba(74, 222, 128, 0.25);
        }

        .match-summary .result .badge.incorrect {
            background: var(--danger-glow);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .match-summary .result .badge.future {
            background: rgba(96, 165, 250, 0.12);
            color: var(--info);
            border: 1px solid rgba(96, 165, 250, 0.25);
        }

        .match-summary .confidence {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .match-summary .expand-icon {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-align: center;
            transition: transform 0.2s;
        }

        .match-card.expanded .expand-icon { transform: rotate(180deg); }

        /* Expanded details */
        .match-details {
            display: none;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
            padding: 1rem 1.25rem;
        }

        .match-card.expanded .match-details { display: block; }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .detail-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.9rem 1rem;
        }

        .detail-box .label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .detail-box .value {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .detail-box .sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
        }

        .skill-comparison {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .skill-comparison .skill-pill {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.6rem 0.8rem;
            text-align: center;
        }

        .skill-comparison .skill-pill .name {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .skill-comparison .skill-pill .score {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.1rem;
        }

        .skill-comparison .vs {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Rankings */
        .rankings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 0.75rem;
        }

        .rank-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.9rem 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.9rem;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .rank-card:hover { border-color: var(--accent-dim); }

        .rank-card .rank {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text-muted);
            min-width: 34px;
            text-align: center;
        }

        .rank-card .rank.top { color: var(--accent); }

        .rank-card .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--surface-2);
            border: 1px solid var(--border);
            display: grid;
            place-items: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .rank-card .info { flex: 1; min-width: 0; }

        .rank-card .name {
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rank-card .meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        .rank-card .skill {
            text-align: right;
        }

        .rank-card .skill .score {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--accent);
        }

        .rank-card .skill .var {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
            align-items: center;
        }

        .pagination button {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            padding: 0.45rem 0.9rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .pagination button:hover { border-color: var(--accent); color: var(--accent); }
        .pagination button:disabled { opacity: 0.4; cursor: default; color: var(--text-muted); }

        .pagination .info {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* Empty / loading */
        .loading, .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a { color: var(--text-muted); text-decoration: underline; }
        footer a:hover { color: var(--accent); }

        /* Mobile */
        @media (max-width: 760px) {
            .header-inner { flex-direction: column; align-items: flex-start; }
            nav.tabs { width: 100%; justify-content: stretch; }
            nav.tabs .tab { flex: 1; text-align: center; }
            .match-summary {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
            .match-summary .date { grid-column: 1 / -1; order: -1; }
            .match-summary .result { grid-column: 1; }
            .match-summary .expand-icon { grid-column: 2; text-align: right; }
            .details-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="brand">
                <div class="brand-icon">🎾</div>
                <div class="brand-text">
                    <h1>Tennis SSM <span style="color:var(--accent)">Predictions</span></h1>
                    <div class="subtitle" id="subtitle">Loading model data…</div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <nav class="tabs" role="tablist" aria-label="Main sections">
                    <button class="tab active" role="tab" data-tab="matches" aria-selected="true">Match Predictions</button>
                    <button class="tab" role="tab" data-tab="rankings" aria-selected="false">Player Rankings</button>
                </nav>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light and dark mode" title="Toggle theme">
                    🌙
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Metrics -->
        <div class="metrics" id="metrics"></div>

        <!-- Matches tab -->
        <section id="tab-matches" aria-labelledby="tab-matches">
            <div class="section-title">
                Match Predictions
                <span class="count" id="match-count">0 matches</span>
            </div>

            <div class="filters">
                <input type="text" id="search" placeholder="Search player name…" aria-label="Search player name">
                <label>
                    <input type="checkbox" id="only-incorrect"> Only incorrect
                </label>
                <label>
                    <input type="checkbox" id="show-future" checked> Show future fixtures
                </label>
                <label>
                        <option value="date-asc">Oldest first</option>
                        <option value="confidence-desc">Highest confidence</option>
                        <option value="confidence-asc">Lowest confidence</option>
                        <option value="log-score-desc">Best log-score</option>
                        <option value="log-score-asc">Worst log-score</option>
                    </select>
                </label>
            </div>

            <div class="match-list" id="match-list"></div>
            <div class="pagination" id="pagination"></div>
        </section>

        <!-- Rankings tab -->
        <section id="tab-rankings" style="display:none;" aria-labelledby="tab-rankings">
            <div class="section-title">
                Player Rankings
                <span class="count" id="ranking-count">0 players</span>
            </div>
            <div class="rankings-grid" id="rankings"></div>
        </section>
    </main>

    <footer>
        Powered by <a href="https://github.com/state-space-models/cuthbert" target="_blank">cuthbert</a> ·
        Gaussian Factorial State-Space Model ·
        Data from <a href="http://www.tennis-data.co.uk/" target="_blank">tennis-data.co.uk</a> ·
        <a href="https://github.com/ryantjx/tennis_ssm" target="_blank">Source on GitHub</a>
    </footer>

    <script>
        let DATA = null;
        let filteredMatches = [];
        let currentPage = 0;
        const PAGE_SIZE = 25;

        // Wait for DOM to be ready
        function init() {
        // Fetch data
        fetch('predictions.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                DATA = data;
                renderMetrics();
                renderRankings();
                applyFilters();
                const generated = new Date(data.generated_at);
                document.getElementById('subtitle').textContent =
                    `Generated ${generated.toLocaleString()} · ` +
                    `τ=${data.model_params.tau.toFixed(4)}, s=${data.model_params.s.toFixed(4)}`;
            })
            .catch(err => {
                document.getElementById('subtitle').textContent = 'Error loading predictions data';
                const msg = (err && err.message) ? err.message : String(err);
                document.getElementById('match-list').innerHTML =
                    `<div class="empty"><div class="empty-icon">⚠️</div>Could not load predictions.json.<br>${msg}</div>`;
                console.error(err);
            });
        }

        function renderMetrics() {
            const m = DATA.metrics;
            const accuracyDelta = (m.accuracy * 100) - 50.0;
            const logDelta = m.avg_log_score - m.uniform_baseline;
            const metrics = [
                { label: 'Test Matches', value: m.n_test_matches, cls: 'info', delta: '2026 WTA season' },
                { label: 'Accuracy', value: (m.accuracy * 100).toFixed(1) + '%', cls: 'good', delta: `${accuracyDelta >= 0 ? '+' : ''}${accuracyDelta.toFixed(1)}% vs coin flip` },
                { label: 'Avg Log-Score', value: m.avg_log_score.toFixed(4), cls: '', delta: `${logDelta >= 0 ? '+' : ''}${logDelta.toFixed(4)} vs uniform` },
                { label: 'Uniform Baseline', value: m.uniform_baseline.toFixed(4), cls: 'bad', delta: 'random guess' },
            ];
            document.getElementById('metrics').innerHTML = metrics.map(m => `
                <div class="metric-card">
                    <div class="label">${m.label}</div>
                    <div class="value ${m.cls}">${m.value}</div>
                    <div class="delta">${m.delta}</div>
                </div>
            `).join('');
        }

        function renderRankings() {
            const players = DATA.top_players;
            document.getElementById('ranking-count').textContent = `${players.length} players`;
            const html = players.map((p, i) => {
                const rank = i + 1;
                const topClass = rank <= 3 ? 'top' : '';
                const initials = p.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
                return `
                    <div class="rank-card">
                        <div class="rank ${topClass}">${rank}</div>
                        <div class="avatar">${initials}</div>
                        <div class="info">
                            <div class="name">${p.name}</div>
                            <div class="meta">Skill uncertainty σ² = ${p.variance.toFixed(3)}</div>
                        </div>
                        <div class="skill">
                            <div class="score">${p.skill > 0 ? '+' : ''}${p.skill.toFixed(2)}</div>
                            <div class="var">skill rating</div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById('rankings').innerHTML = html;
        }

        function confidenceTier(conf) {
            if (conf >= 0.85) return { label: 'High confidence', color: '#4ade80' };
            if (conf >= 0.70) return { label: 'Likely', color: '#60a5fa' };
            if (conf >= 0.60) return { label: 'Lean', color: '#fbbf24' };
            return { label: 'Toss-up', color: '#8b92a8' };
        }

        function applyFilters() {
            const searchEl = document.getElementById('search');
            const onlyIncorrectEl = document.getElementById('only-incorrect');
            const showFutureEl = document.getElementById('show-future');
            const sortEl = document.getElementById('sort');
            
            if (!searchEl || !onlyIncorrectEl || !showFutureEl || !sortEl) return;
            
            const search = searchEl.value.toLowerCase();
            const onlyIncorrect = onlyIncorrectEl.checked;
            const showFuture = showFutureEl.checked;
            const sort = sortEl.value;

            const baseMatches = DATA.matches || [];
            const futureMatches = showFuture ? (DATA.future_matches || []) : [];
            const allMatches = [...baseMatches, ...futureMatches];

            filteredMatches = allMatches.filter(m => {
                if (search && !m.player1.toLowerCase().includes(search) && !m.player2.toLowerCase().includes(search))
                    return false;
                if (onlyIncorrect && (m.correct || m.is_future)) return false;
                return true;
            });

            const [field, dir] = sort.split('-');
            filteredMatches.sort((a, b) => {
                let va, vb;
                if (field === 'date') { va = a.timestamp; vb = b.timestamp; }
                else if (field === 'confidence') { va = a.confidence; vb = b.confidence; }
                else { va = a.log_score; vb = b.log_score; }
                if (va < vb) return dir === 'asc' ? -1 : 1;
                if (va > vb) return dir === 'asc' ? 1 : -1;
                return 0;
            });

            currentPage = 0;
            renderMatches();
        }

        function renderMatches() {
            const start = currentPage * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageMatches = filteredMatches.slice(start, end);
            document.getElementById('match-count').textContent = `${filteredMatches.length} matches`;

            if (pageMatches.length === 0) {
                document.getElementById('match-list').innerHTML =
                    '<div class="empty"><div class="empty-icon">🔍</div>No matches found.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const groupByDate = document.getElementById('only-upcoming').checked;
            let html = '';

            if (groupByDate) {
                const groups = {};
                pageMatches.forEach(m => {
                    if (!groups[m.date]) groups[m.date] = [];
                    groups[m.date].push(m);
                });
                Object.keys(groups).sort().reverse().forEach(date => {
                    html += `<div class="date-group"><div class="date-header">${formatDate(date)}</div>`;
                    html += groups[date].map(m => matchCardHTML(m)).join('');
                    html += '</div>';
                });
            } else {
                html = pageMatches.map(m => matchCardHTML(m)).join('');
            }

            document.getElementById('match-list').innerHTML = html;
            attachCardListeners();

            const totalPages = Math.ceil(filteredMatches.length / PAGE_SIZE);
            document.getElementById('pagination').innerHTML = `
                <button onclick="prevPage()" ${currentPage === 0 ? 'disabled' : ''}>← Prev</button>
                <span class="info">Page ${currentPage + 1} of ${totalPages} (${filteredMatches.length} matches)</span>
                <button onclick="nextPage()" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            `;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
        }

        function matchCardHTML(m) {
            const isFuture = !!m.is_future;
            const p1Win = !isFuture && m.actual_winner === m.player1;
            const p1Class = p1Win ? 'winner' : 'loser';
            const p2Class = p1Win ? 'loser' : 'winner';
            let badge;
            if (isFuture) {
                badge = '<span class="badge future">🔮 Future</span>';
            } else if (m.correct) {
                badge = '<span class="badge correct">✓ Correct</span>';
            } else {
                badge = '<span class="badge incorrect">✗ Upset</span>';
            }
            const p1Pct = (m.p_player1_win * 100).toFixed(1);
            const p2Pct = (m.p_player2_win * 100).toFixed(1);
            const tier = confidenceTier(m.confidence);
            const skillDiff = m.player1_skill - m.player2_skill;
            const predicted = m.predicted_winner === m.player1 ? m.player1 : m.player2;

            const actualWinnerHTML = isFuture
                ? `<div class="detail-box"><div class="label">Fixture status</div><div class="value" style="color:var(--info)">Not yet played</div><div class="sub">Hypothetical match at current skill estimates</div></div>`
                : `<div class="detail-box">
                    <div class="label">Actual winner</div>
                    <div class="value">${m.actual_winner}</div>
                    <div class="sub">${m.correct ? 'Prediction matched result' : 'Result was an upset'}</div>
                   </div>
                   <div class="detail-box">
                    <div class="label">Match log-score</div>
                    <div class="value" style="color:${m.log_score > Math.log(0.5) ? 'var(--accent)' : 'var(--danger)'}">${m.log_score.toFixed(4)}</div>
                    <div class="sub">Uniform baseline = ${DATA.metrics.uniform_baseline.toFixed(4)}</div>
                   </div>`;

            return `
                <div class="match-card ${isFuture ? 'future-match' : ''}" data-match>
                    <div class="match-summary">
                        <div class="date">${m.date}${isFuture ? ' · Future' : ''}</div>
                        <div class="player-block ${p1Class}">
                            <div class="player-name">${m.player1} ${p1Win ? '<span class="seed">W</span>' : ''}</div>
                            <div class="player-prob">${p1Pct}% win prob</div>
                            <div class="prob-bar">
                                <div class="fill p1" style="width:${p1Pct}%"></div>
                            </div>
                        </div>
                        <div class="player-block ${p2Class}">
                            <div class="player-name">${m.player2} ${!p1Win ? '<span class="seed">W</span>' : ''}</div>
                            <div class="player-prob">${p2Pct}% win prob</div>
                            <div class="prob-bar">
                                <div class="fill p2" style="width:${p2Pct}%"></div>
                            </div>
                        </div>
                        <div class="result">
                            ${badge}
                            <div class="confidence" style="color:${tier.color}">${tier.label}</div>
                        </div>
                        <div class="expand-icon">▼</div>
                    </div>
                    <div class="match-details">
                        <div class="details-grid">
                            <div class="detail-box">
                                <div class="label">Predicted winner</div>
                                <div class="value" style="color:${isFuture ? 'var(--info)' : (m.correct ? 'var(--accent)' : 'var(--danger)')};">${predicted}</div>
                                <div class="sub">Model picked ${(m.confidence * 100).toFixed(1)}% likely winner</div>
                            </div>
                            ${actualWinnerHTML}
                            <div class="detail-box" style="grid-column: 1 / -1;">
                                <div class="label">Skill comparison at match time</div>
                                <div class="skill-comparison">
                                    <div class="skill-pill">
                                        <div class="name">${m.player1}</div>
                                        <div class="score" style="color:var(--accent)">${m.player1_skill > 0 ? '+' : ''}${m.player1_skill.toFixed(2)}</div>
                                        <div class="sub">σ = ${m.player1_skill_sd.toFixed(2)}</div>
                                    </div>
                                    <div class="vs">VS</div>
                                    <div class="skill-pill">
                                        <div class="name">${m.player2}</div>
                                        <div class="score" style="color:var(--danger)">${m.player2_skill > 0 ? '+' : ''}${m.player2_skill.toFixed(2)}</div>
                                        <div class="sub">σ = ${m.player2_skill_sd.toFixed(2)}</div>
                                    </div>
                                </div>
                                <div class="sub" style="margin-top:0.6rem;text-align:center;">
                                    Skill gap: ${skillDiff > 0 ? '+' : ''}${skillDiff.toFixed(2)} in favour of ${m.player1}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function attachCardListeners() {
            document.querySelectorAll('[data-match]').forEach(card => {
                const summary = card.querySelector('.match-summary');
                summary.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                });
            });
        }

        function prevPage() { if (currentPage > 0) { currentPage--; renderMatches(); } }
        function nextPage() { currentPage++; renderMatches(); }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
                const target = tab.dataset.tab;
                document.getElementById('tab-matches').style.display = target === 'matches' ? 'block' : 'none';
                document.getElementById('tab-rankings').style.display = target === 'rankings' ? 'block' : 'none';
            });
        });

        // Theme toggle
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('tennis-ssm-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        let isDark = savedTheme ? savedTheme === 'dark' : systemDark;

        function applyTheme() {
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '🌙' : '☀️';
            themeToggle.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            localStorage.setItem('tennis-ssm-theme', isDark ? 'dark' : 'light');
            applyTheme();
        });

        applyTheme();

        // Filters
        const searchEl = document.getElementById('search');
        const onlyIncorrectEl = document.getElementById('only-incorrect');
        const showFutureEl = document.getElementById('show-future');
        const onlyUpcomingEl = document.getElementById('only-upcoming');
        const sortEl = document.getElementById('sort');
        
        if (searchEl) searchEl.addEventListener('input', applyFilters);
        if (onlyIncorrectEl) onlyIncorrectEl.addEventListener('change', applyFilters);
        if (showFutureEl) showFutureEl.addEventListener('change', applyFilters);
        if (onlyUpcomingEl) onlyUpcomingEl.addEventListener('change', applyFilters);
        if (sortEl) sortEl.addEventListener('change', applyFilters);
        
        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>

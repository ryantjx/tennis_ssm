name: Generate Daily Predictions

on:
  workflow_dispatch:
  schedule:
    # Avoid the top-of-hour scheduler backlog and publish before the WTA day.
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: "daily-predictions"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          uv pip install -r requirements.txt

      - name: Generate latest prediction data
        run: |
          source .venv/bin/activate
          for attempt in 1 2 3; do
            if python main.py; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 30))
            fi
          done
          exit 1

      - name: Commit prediction outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs/tennis_factorial_state.json outputs/latest outputs/daily
          git diff --cached --quiet || git commit -m "Update daily predictions"
          git pull --rebase --autostash origin main
          git push

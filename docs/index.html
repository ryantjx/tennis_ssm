<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis SSM — Match Predictions</title>
    <style>
        :root {
            --bg: #0f1117;
            --card-bg: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --text-muted: #8b8d97;
            --accent: #4ade80;
            --accent-dim: #22c55e;
            --danger: #f87171;
            --warning: #fbbf24;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 0;
        }

        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        header h1 .highlight { color: var(--accent); }

        header .subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Metrics bar */
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
        }

        .metric-card .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .metric-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 0.25rem;
        }

        .metric-card .value.good { color: var(--accent); }
        .metric-card .value.bad { color: var(--danger); }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters input, .filters select {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
        }

        .filters input { flex: 1; min-width: 200px; }
        .filters label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Match table */
        .match-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .match-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            display: grid;
            grid-template-columns: 90px 1fr 1fr 120px;
            gap: 1rem;
            align-items: center;
            transition: border-color 0.2s;
        }

        .match-card:hover { border-color: var(--accent-dim); }

        .match-card .date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .match-card .player {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .match-card .player .prob {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .match-card .player.winner { color: var(--accent); }
        .match-card .player.loser { color: var(--text-muted); }

        .match-card .prob-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            overflow: hidden;
            margin-top: 4px;
        }

        .match-card .prob-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .match-card .prob-bar .fill.p1 { background: var(--accent); }
        .match-card .prob-bar .fill.p2 { background: var(--danger); }

        .match-card .result {
            text-align: center;
            font-size: 0.8rem;
        }

        .match-card .result .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .match-card .result .badge.correct {
            background: rgba(74, 222, 128, 0.15);
            color: var(--accent);
        }

        .match-card .result .badge.incorrect {
            background: rgba(248, 113, 113, 0.15);
            color: var(--danger);
        }

        /* Player rankings */
        .rankings {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem;
        }

        .rank-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .rank-card .rank {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 30px;
        }

        .rank-card .name {
            font-weight: 600;
            flex: 1;
        }

        .rank-card .skill {
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 600;
        }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
            align-items: center;
        }

        .pagination button {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .pagination button:hover { border-color: var(--accent); }
        .pagination button:disabled { opacity: 0.4; cursor: default; }
        .pagination .info { color: var(--text-muted); font-size: 0.85rem; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 700px) {
            .match-card {
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .match-card .date { order: -1; }
            .match-card .result { text-align: left; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎾 <span class="highlight">Tennis SSM</span> — Match Predictions</h1>
        <div class="subtitle" id="subtitle">Loading model data…</div>
    </header>

    <div class="container">
        <!-- Metrics -->
        <div class="metrics" id="metrics"></div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="matches">Match Predictions</div>
            <div class="tab" data-tab="rankings">Player Rankings</div>
        </div>

        <!-- Matches tab -->
        <div id="tab-matches">
            <div class="filters">
                <input type="text" id="search" placeholder="Search player name…">
                <label>
                    <input type="checkbox" id="only-incorrect"> Only incorrect
                </label>
                <label>
                    Sort:
                    <select id="sort">
                        <option value="date-desc">Newest first</option>
                        <option value="date-asc">Oldest first</option>
                        <option value="confidence-desc">Highest confidence</option>
                        <option value="confidence-asc">Lowest confidence</option>
                    </select>
                </label>
            </div>
            <div class="match-list" id="match-list"></div>
            <div class="pagination" id="pagination"></div>
        </div>

        <!-- Rankings tab -->
        <div id="tab-rankings" style="display:none;">
            <div class="rankings" id="rankings"></div>
        </div>
    </div>

    <footer>
        Powered by <a href="https://github.com/state-space-models/cuthbert" target="_blank">cuthbert</a> ·
        Gaussian Factorial State-Space Model ·
        Data from <a href="http://www.tennis-data.co.uk/" target="_blank">tennis-data.co.uk</a>
    </footer>

    <script>
        let DATA = null;
        let filteredMatches = [];
        let currentPage = 0;
        const PAGE_SIZE = 25;

        // Fetch data
        fetch('predictions.json')
            .then(r => r.json())
            .then(data => {
                DATA = data;
                renderMetrics();
                renderRankings();
                applyFilters();
                document.getElementById('subtitle').textContent =
                    `Generated ${new Date(data.generated_at).toLocaleString()} · ` +
                    `τ=${data.model_params.tau.toFixed(4)}, s=${data.model_params.s.toFixed(4)}`;
            })
            .catch(err => {
                document.getElementById('subtitle').textContent = 'Error loading data';
                console.error(err);
            });

        function renderMetrics() {
            const m = DATA.metrics;
            const metrics = [
                { label: 'Test Matches', value: m.n_test_matches, cls: '' },
                { label: 'Accuracy', value: (m.accuracy * 100).toFixed(1) + '%', cls: 'good' },
                { label: 'Avg Log-Score', value: m.avg_log_score.toFixed(4), cls: '' },
                { label: 'Uniform Baseline', value: m.uniform_baseline.toFixed(4), cls: '' },
            ];
            document.getElementById('metrics').innerHTML = metrics.map(m => `
                <div class="metric-card">
                    <div class="label">${m.label}</div>
                    <div class="value ${m.cls}">${m.value}</div>
                </div>
            `).join('');
        }

        function renderRankings() {
            const html = DATA.top_players.map((p, i) => `
                <div class="rank-card">
                    <div class="rank">${i + 1}</div>
                    <div class="name">${p.name}</div>
                    <div class="skill">${p.skill > 0 ? '+' : ''}${p.skill.toFixed(3)}</div>
                </div>
            `).join('');
            document.getElementById('rankings').innerHTML = html;
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const onlyIncorrect = document.getElementById('only-incorrect').checked;
            const sort = document.getElementById('sort').value;

            filteredMatches = DATA.matches.filter(m => {
                if (search && !m.player1.toLowerCase().includes(search) && !m.player2.toLowerCase().includes(search))
                    return false;
                if (onlyIncorrect && m.correct) return false;
                return true;
            });

            // Sort
            const [field, dir] = sort.split('-');
            filteredMatches.sort((a, b) => {
                let va, vb;
                if (field === 'date') { va = a.date; vb = b.date; }
                else { va = Math.abs(a.p_player1_win - 0.5); vb = Math.abs(b.p_player1_win - 0.5); }
                if (va < vb) return dir === 'asc' ? -1 : 1;
                if (va > vb) return dir === 'asc' ? 1 : -1;
                return 0;
            });

            currentPage = 0;
            renderMatches();
        }

        function renderMatches() {
            const start = currentPage * PAGE_SIZE;
            const end = start + PAGE_SIZE;
            const pageMatches = filteredMatches.slice(start, end);

            if (pageMatches.length === 0) {
                document.getElementById('match-list').innerHTML =
                    '<div class="loading">No matches found.</div>';
                document.getElementById('pagination').innerHTML = '';
                return;
            }

            const html = pageMatches.map(m => {
                const p1Win = m.actual_winner === m.player1;
                const p1Class = p1Win ? 'winner' : 'loser';
                const p2Class = p1Win ? 'loser' : 'winner';
                const badge = m.correct
                    ? '<span class="badge correct">✓ Correct</span>'
                    : '<span class="badge incorrect">✗ Wrong</span>';
                const p1Pct = (m.p_player1_win * 100).toFixed(1);
                const p2Pct = (m.p_player2_win * 100).toFixed(1);

                return `
                    <div class="match-card">
                        <div class="date">${m.date}</div>
                        <div class="player ${p1Class}">
                            ${m.player1}
                            <span class="prob">${p1Pct}% win prob</span>
                            <div class="prob-bar"><div class="fill p1" style="width:${p1Pct}%"></div></div>
                        </div>
                        <div class="player ${p2Class}">
                            ${m.player2}
                            <span class="prob">${p2Pct}% win prob</span>
                            <div class="prob-bar"><div class="fill p2" style="width:${p2Pct}%"></div></div>
                        </div>
                        <div class="result">${badge}</div>
                    </div>
                `;
            }).join('');

            document.getElementById('match-list').innerHTML = html;

            // Pagination
            const totalPages = Math.ceil(filteredMatches.length / PAGE_SIZE);
            document.getElementById('pagination').innerHTML = `
                <button onclick="prevPage()" ${currentPage === 0 ? 'disabled' : ''}>← Prev</button>
                <span class="info">Page ${currentPage + 1} of ${totalPages} (${filteredMatches.length} matches)</span>
                <button onclick="nextPage()" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
            `;
        }

        function prevPage() { if (currentPage > 0) { currentPage--; renderMatches(); } }
        function nextPage() { currentPage++; renderMatches(); }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-matches').style.display = tab.dataset.tab === 'matches' ? '' : 'none';
                document.getElementById('tab-rankings').style.display = tab.dataset.tab === 'rankings' ? '' : 'none';
            });
        });

        // Filters
        document.getElementById('search').addEventListener('input', applyFilters);
        document.getElementById('only-incorrect').addEventListener('change', applyFilters);
        document.getElementById('sort').addEventListener('change', applyFilters);
    </script>
</body>
</html>
